services:
  vouch-server:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    image: talhadevelopes/vouch-server:${TAG:-latest}
    container_name: vouch-server
    env_file:
      - ./apps/api/.env
    ports:
      - "4000:4000"
    restart: unless-stopped

  vouch-web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
    image: talhadevelopes/vouch-web:${TAG:-latest}
    container_name: vouch-web
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
    depends_on:
      - vouch-server
    ports:
      - "4000:4000"
    restart: unless-stopped
